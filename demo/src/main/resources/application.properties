server.port=8080

# Локальные настройки (application-local.properties) — загружаются если файл существует
spring.profiles.include=local

# PostgreSQL - use postgres user (env vars can override)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:carsharing}
spring.datasource.username=postgres
# Пароль из переменной окружения DB_PASSWORD (не хранить в репозитории!)
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Security debug (временно)
logging.level.org.springframework.security=DEBUG

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true